name: Deploy MarketLens to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 23 * * *"
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Collect market data
        run: |
          timeout 300s node scripts/collect-marketlens.mjs || echo "Collector skipped; deploying with existing snapshot."

      - name: Update cachebuster
        run: node scripts/update-cachebuster.mjs

      - name: Run checks
        run: |
          node --check script.js
          node --check scripts/collect-marketlens.mjs
          node scripts/ui-regression-check.mjs
          node scripts/regression-check.mjs

      - name: Persist generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/marketlens.snapshot.json data/marketlens.history.json data/marketlens.public-history.json index.html
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh MarketLens data [skip ci]"
            git push
          fi

      - name: Prepare public artifact
        run: |
          rm -rf public
          mkdir -p public/data
          cp index.html styles.css script.js public/
          cp data/marketlens.snapshot.json public/data/
          cp data/marketlens.public-history.json public/data/

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
